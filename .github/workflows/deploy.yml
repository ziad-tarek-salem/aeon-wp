name: Deploy theme

# Push to `main` → deploy the AEON theme to the production WordPress host via
# FTPS. CODE ONLY — never the database, uploads, or other site content.
#
# Requires 3 GitHub repo secrets (Settings → Secrets and variables → Actions):
#   FTP_HOST     = 91.108.101.28
#   FTP_USER     = u171546863     # the MAIN Hostinger account (shared with mostarstar.com)
#   FTP_PASSWORD = <the u171546863 FTP password from hPanel → Files → FTP Accounts>
#
# IMPORTANT: authenticate as the main account `u171546863` — NOT a per-domain
# login like `u171546863.uaeaeon.com` (that one returns "530 Login incorrect").
# This is the same account/password MostarStar's deploy uses.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

# Least privilege: this job only needs to read the repo to check it out.
# It never writes back to GitHub, so deny everything else by default.
permissions:
  contents: read

# Never let two deploys overlap (a second push waits for the first to finish).
concurrency:
  group: deploy-theme
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scoped to the theme folder so the sync never touches (or deletes)
      # plugins, uploads, or other content on the server.
      - name: Deploy theme (aeon)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./app/wp-content/themes/aeon/
          # uaeaeon.com is an ADDON/secondary domain on the u171546863 account,
          # so its live docroot is /domains/uaeaeon.com/public_html/ — NOT the
          # account's primary /public_html/. Verified 2026-06-30: a deploy to
          # /public_html/ CREATED a fresh themes/aeon folder there and never
          # changed the live uaeaeon.com CSS, proving the live root is elsewhere.
          server-dir: /domains/uaeaeon.com/public_html/wp-content/themes/aeon/

# After each deploy, purge any host/page cache, and if rewrite rules changed,
# re-save Settings → Permalinks once.
