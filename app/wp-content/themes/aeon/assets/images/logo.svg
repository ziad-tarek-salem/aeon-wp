<svg width="360" height="120" viewBox="0 0 360 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AEON Digital Marketing">
  <defs>
    <linearGradient id="aeonPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B2A86"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="aeonOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F36F21"/>
      <stop offset="1" stop-color="#FF9D4D"/>
    </linearGradient>
  </defs>
  <!-- AEO -->
  <text x="0" y="62" font-family="Poppins, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="url(#aeonPurple)">AE</text>
  <!-- O as arrow-circle -->
  <circle cx="150" cy="40" r="26" stroke="url(#aeonPurple)" stroke-width="9" fill="none"/>
  <path d="M138 40 H160 M153 32 L162 40 L153 48" stroke="url(#aeonPurple)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- N + swoosh -->
  <text x="184" y="62" font-family="Poppins, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="url(#aeonOrange)">N</text>
  <path d="M236 18 q22 -10 30 6 q-14 -6 -26 8" fill="url(#aeonOrange)"/>
  <!-- DIGITAL pill -->
  <rect x="2" y="78" width="118" height="26" rx="6" fill="url(#aeonPurple)"/>
  <text x="61" y="97" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#ffffff">DIGITAL</text>
  <!-- MARKETING -->
  <text x="128" y="97" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="url(#aeonOrange)">MARKETING</text>
</svg>
